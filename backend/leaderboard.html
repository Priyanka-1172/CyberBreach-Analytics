<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Breach Leaderboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    .leaderboard-table th {
      text-align: left;
      padding: 12px 16px;
      color: #666;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #222;
    }
    .leaderboard-table td {
      padding: 14px 16px;
      border-bottom: 1px solid #1a1a2e;
      font-size: 14px;
      color: #ccc;
    }
    .leaderboard-table tr:hover td { background: #1a1a2e; }
    .rank-cell { font-size: 20px; text-align: center; }
    .company-name { font-weight: 600; color: #fff; font-size: 15px; }
    .records-cell {
      font-weight: 700;
      font-size: 15px;
      color: #dc143c;
    }
    .bar-cell { width: 200px; }
    .mini-bar {
      background: #1e1e2e;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .mini-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #dc143c, #ff4466);
      transition: width 1s ease;
    }
    .top1 td { background: #1a0808 !important; }
    .top2 td { background: #111118 !important; }
    .top3 td { background: #0d0d15 !important; }
    .summary-box {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: #12121a;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 16px 20px;
    }
    .summary-card .s-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }
    .summary-card .s-value {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    .industry-tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      background: #1e1e2e;
      color: #888;
      border: 1px solid #333;
    }
  </style>
</head>
<body>

<nav>
  <span class="logo">🔐 CyberBreach Analytics</span>
  <a href="index.html"class="active">Overview</a>
  <a href="trends.html"class="active">Trends</a>
  <a href="predict.html"class="active">Predict Severity</a>
  <a href="search.html"class="active">🔍 Search</a>
  <a href="compare.html"class="active">⚖️ Compare</a>
  <a href="leaderboard.html"class="active">🏆 Breach Ranking</a>
</nav>

<div class="container">
  <h1>🏆 Biggest Breaches Ever</h1>
  <p class="subtitle">Top 10 largest data breaches ranked by records leaked</p>

  <div class="summary-box" id="summary"></div>

  <div class="card">
    <table class="leaderboard-table" id="table">
      <thead>
        <tr>
          <th style="width:60px">Rank</th>
          <th>Company</th>
          <th>Year</th>
          <th>Industry</th>
          <th>Attack</th>
          <th>Records Leaked</th>
          <th>Scale</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<script>
const API = "https://cyberbreach-analytics.onrender.com";

async function loadLeaderboard() {
  const res  = await fetch(`${API}/leaderboard`);
  const data = await res.json();
  const lb   = data.leaderboard;

  const maxRecords = lb[0].Records;

  // Summary cards
  document.getElementById("summary").innerHTML = `
    <div class="summary-card">
      <div class="s-label">Biggest Breach Ever</div>
      <div class="s-value">${lb[0].Entity}</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Most Records in One Breach</div>
      <div class="s-value">${(lb[0].Records/1e9).toFixed(1)}B</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Top 10 Combined Records</div>
      <div class="s-value">${(data.total_records_top10/1e9).toFixed(1)}B</div>
    </div>
  `;

  // Table rows
  document.getElementById("table-body").innerHTML = lb.map((b, i) => `
    <tr class="${i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : ''}">
      <td class="rank-cell">${b.medal}</td>
      <td>
        <div class="company-name">${b.Entity}</div>
      </td>
      <td>${b.Year}</td>
      <td><span class="industry-tag">${b.Industry}</span></td>
      <td>${b.Method}</td>
      <td class="records-cell">${Number(b.Records).toLocaleString()}</td>
      <td class="bar-cell">
        <div class="mini-bar">
          <div class="mini-bar-fill" style="width:${b.Records/maxRecords*100}%"></div>
        </div>
      </td>
    </tr>
  `).join("");
}

loadLeaderboard();
</script>
</body>
</html>
